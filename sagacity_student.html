<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagacity Tea — Join</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root{--tea:#2D5016;--leaf:#4A7C2F;--gold:#C9A84C;--cream:#F7F3EB;--dark:#1C1C1C;--mist:#E6EFD8;--border:#DDD5C4;--soft:#F0EBE0;--accent:#8B3A3A;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;min-height:100vh;}
  body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);}

  .screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;}
  .screen.active{display:flex;}

  /* JOIN */
  #s-join{text-align:center;}
  .logo{font-family:'Playfair Display',serif;font-size:clamp(26px,5vw,48px);color:var(--tea);margin-bottom:4px;}
  .logo span{color:var(--gold);}
  .logo-sub{font-size:14px;color:#aaa;margin-bottom:32px;}
  .pick-label{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:#aaa;margin-bottom:10px;}
  .group-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:480px;margin-bottom:24px;}
  .gp{padding:13px 8px;background:white;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;}
  .gp:hover{border-color:var(--leaf);background:var(--mist);color:var(--tea);}
  .gp.sel{background:var(--tea);color:var(--gold);border-color:var(--tea);}

  /* WAITING */
  #s-waiting{text-align:center;}
  .wg-name{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,52px);color:var(--tea);margin-bottom:6px;}
  .wg-sub{font-size:14px;color:#aaa;margin-bottom:28px;}
  .dots{display:flex;gap:7px;justify-content:center;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--border);animation:dp 1.4s infinite ease-in-out;}
  .dot:nth-child(2){animation-delay:.2s;}
  .dot:nth-child(3){animation-delay:.4s;}
  @keyframes dp{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}

  /* ROUND */
  #s-round{max-width:620px;width:100%;gap:0;}
  .rh{margin-bottom:16px;}
  .rh-tag{font-size:9px;text-transform:uppercase;letter-spacing:.14em;font-weight:700;padding:2px 9px;border-radius:20px;display:inline-block;margin-bottom:6px;}
  .tag-c{color:#8a5a00;background:#fff7e6;}
  .tag-f{color:var(--accent);background:#fff0f0;}
  .tag-h{color:#1a5a8a;background:#e6f0ff;}
  .tag-t{color:#5a1a8a;background:#f5e6ff;}
  .tag-v{color:var(--tea);background:var(--mist);}
  .rh-title{font-family:'Playfair Display',serif;font-size:clamp(20px,4vw,32px);color:var(--tea);margin-bottom:5px;}
  .rh-task{font-size:13.5px;color:#555;line-height:1.65;margin-bottom:14px;}

  /* Timer */
  .timer-bar{background:white;border:1.5px solid var(--border);border-radius:8px;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .tb-lbl{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;}
  .tb-time{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--tea);}
  .tb-time.warn{color:#cc3333;animation:tp .5s infinite alternate;}
  @keyframes tp{from{opacity:1}to{opacity:.3}}

  /* Form */
  .form-card{background:white;border:1.5px solid var(--border);border-radius:10px;padding:18px;display:flex;flex-direction:column;gap:12px;width:100%;}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#aaa;font-weight:600;}
  .field input,.field textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--dark);background:white;outline:none;transition:border-color .15s;resize:vertical;}
  .field input:focus,.field textarea:focus{border-color:var(--leaf);}
  .field textarea{min-height:74px;}
  .field .hint{font-size:11px;color:#bbb;}
  .char-ct{font-size:10px;color:#bbb;text-align:right;}
  .char-ct.near{color:var(--gold);}

  .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .opt{padding:9px 8px;background:var(--soft);border:1.5px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;transition:all .15s;text-align:center;}
  .opt:hover{border-color:var(--leaf);background:var(--mist);}
  .opt.sel{background:var(--tea);color:var(--gold);border-color:var(--tea);}

  .threat-list{display:flex;flex-direction:column;gap:5px;}
  .thr{padding:10px 13px;background:var(--soft);border:1.5px solid var(--border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s;text-align:left;}
  .thr:hover{border-color:var(--leaf);background:var(--mist);}
  .thr.sel{background:var(--tea);color:var(--gold);border-color:var(--tea);}

  .calc-hint{background:#f8f5f0;border:1.5px solid var(--border);border-radius:6px;padding:11px 13px;font-size:12px;color:#666;line-height:1.75;}
  .calc-hint strong{color:var(--tea);}

  .sub-btn{width:100%;padding:12px;background:var(--tea);color:var(--gold);border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:2px;}
  .sub-btn:hover{background:var(--leaf);}
  .sub-btn:disabled{background:#ccc;color:#fff;cursor:not-allowed;}

  /* SUBMITTED */
  #s-submitted{text-align:center;}
  .sub-icon{font-size:56px;margin-bottom:12px;}
  .sub-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--tea);margin-bottom:6px;}
  .sub-note{font-size:14px;color:#aaa;margin-bottom:20px;}
  .sub-preview{background:white;border:1.5px solid var(--border);border-radius:8px;padding:16px 18px;max-width:460px;width:100%;text-align:left;font-size:13px;color:#555;line-height:1.7;white-space:pre-wrap;}

  /* VOTING */
  #s-voting{max-width:640px;width:100%;}
  .vote-h{font-family:'Playfair Display',serif;font-size:26px;color:var(--tea);margin-bottom:5px;text-align:center;}
  .vote-sub{font-size:13px;color:#aaa;margin-bottom:18px;text-align:center;}
  .vote-list{display:flex;flex-direction:column;gap:8px;width:100%;}
  .vc{background:white;border:1.5px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s;}
  .vc:hover{border-color:var(--leaf);background:var(--mist);}
  .vc.voted{border-color:var(--gold);background:#fffdf5;cursor:default;}
  .vc-grp{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:#bbb;margin-bottom:4px;}
  .vc-body{font-size:13.5px;color:var(--dark);line-height:1.6;}

  /* NOTIF */
  .notif{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--tea);color:var(--gold);padding:9px 20px;border-radius:6px;font-size:13px;font-weight:500;z-index:1000;transition:transform .3s;box-shadow:0 4px 14px rgba(0,0,0,.1);white-space:nowrap;}
  .notif.show{transform:translateX(-50%) translateY(0);}

  .btn-join{width:100%;max-width:280px;padding:12px;background:var(--tea);color:var(--gold);border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-join:hover{background:var(--leaf);}
  .btn-join:disabled{background:#ccc;color:#fff;cursor:not-allowed;}
</style>
</head>
<body>
<div class="notif" id="notif"></div>

<!-- JOIN -->
<div class="screen active" id="s-join">
  <div class="logo">☕ Sagacity Tea <span>Showdown</span></div>
  <div class="logo-sub">Select your group to join</div>
  <div class="pick-label">Your Group</div>
  <div class="group-grid" id="group-grid">
    <div style="color:#aaa;font-size:13px;grid-column:1/-1;text-align:center;padding:20px;">Loading groups…</div>
  </div>
  <button class="btn-join" id="join-btn" onclick="joinGame()" disabled>Join →</button>
</div>

<!-- WAITING -->
<div class="screen" id="s-waiting">
  <div class="wg-name" id="wg-name">Group 1</div>
  <div class="wg-sub">You're in! Waiting for the instructor…</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>

<!-- ROUND -->
<div class="screen" id="s-round">
  <div class="rh" style="width:100%;max-width:620px;">
    <div class="rh-tag" id="rh-tag">ROUND</div>
    <div class="rh-title" id="rh-title">—</div>
    <div class="rh-task" id="rh-task">—</div>
  </div>
  <div class="timer-bar" id="timer-bar" style="display:none;width:100%;max-width:620px;">
    <div class="tb-lbl">Time remaining</div>
    <div class="tb-time" id="stimer">—</div>
  </div>
  <div class="form-card" id="form-card"></div>
</div>

<!-- SUBMITTED -->
<div class="screen" id="s-submitted">
  <div class="sub-icon">✅</div>
  <div class="sub-title">Submitted!</div>
  <div class="sub-note" id="sub-note">Watch the instructor screen.</div>
  <div class="sub-preview" id="sub-preview"></div>
</div>

<!-- VOTING -->
<div class="screen" id="s-voting">
  <div class="vote-h" id="vote-h">Vote for the Best</div>
  <div class="vote-sub" id="vote-sub">Which answer would actually change Kate's mind?</div>
  <div class="vote-list" id="vote-list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBq8s0cZkAnE2d7OdlcUOtA-QYarhHVcqs",
  authDomain: "sagacity-tea.firebaseapp.com",
  databaseURL: "https://sagacity-tea-default-rtdb.firebaseio.com",
  projectId: "sagacity-tea",
  storageBucket: "sagacity-tea.firebasestorage.app",
  messagingSenderId: "558874577393",
  appId: "1:558874577393:web:334c4d894305b9020a5c50"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── STATE ──
let myGroup = null;
let myGroupKey = null;
let gamePhase = null;
let gameRound = null;
let hasSubmitted = false;
let hasVoted = false;
let localTimerSec = 0;
let localTimerInterval = null;

// selected form values
let selThreat='', selOpt='', selDir='';

// ── LOAD GROUPS ──
onValue(ref(db,'groups'), snap => {
  if(!snap.exists()) return;
  const data = snap.val();
  const grid = document.getElementById('group-grid');
  grid.innerHTML = Object.entries(data).map(([key,g])=>`
    <button class="gp" id="gp-${key}" onclick="pickGroup('${key}','${g.name}')">${g.name}</button>`).join('');
});

window.pickGroup = (key, name) => {
  myGroup = name; myGroupKey = key;
  document.querySelectorAll('.gp').forEach(b=>b.classList.remove('sel'));
  document.getElementById(`gp-${key}`)?.classList.add('sel');
  document.getElementById('join-btn').disabled = false;
};

window.joinGame = () => {
  if(!myGroup) return;
  document.getElementById('wg-name').textContent = myGroup;
  showScreen('s-waiting');
  listenToGame();
};

// ── LISTEN TO GAME ──
function listenToGame(){
  onValue(ref(db,'game'), snap => {
    if(!snap.exists()) return;
    const state = snap.val();

    // Sync timer
    if(state.timerSec !== undefined){
      if(state.timerRunning){
        localTimerSec = state.timerSec;
        if(!localTimerInterval) startLocalTimer();
      } else {
        stopLocalTimer();
        localTimerSec = state.timerSec || 0;
        updateSTimer();
      }
    }

    const phase = state.phase;
    const roundId = state.curRound;

    // VOTING
    if(phase === 'voting'){
      if(!hasVoted) loadVoting(state.votingRound, state.votingRound==='r5');
      return;
    }

    // WAITING
    if(phase === 'waiting'){
      if(getCurrentScreen() !== 's-submitted') showScreen('s-waiting');
      hasSubmitted = false; hasVoted = false;
      return;
    }

    // POTATO (special: question changes within r3)
    if(phase === 'potato' && state.potatoQ){
      if(gameRound !== 'r3' || gamePhase !== 'potato' || state.potatoQ !== window._lastPotatoQ){
        window._lastPotatoQ = state.potatoQ;
        gameRound = 'r3'; gamePhase = 'potato';
        hasSubmitted = false;
        loadRoundUI('r3', state.potatoQ);
      }
      return;
    }

    // TWIST
    if(phase === 'twist' && state.twist){
      if(gameRound !== 'r4' || gamePhase !== 'twist'){
        gameRound = 'r4'; gamePhase = 'twist';
        hasSubmitted = false;
        loadRoundUI('r4', null, state.twist, state);
      }
      return;
    }

    // NORMAL ROUND
    if(roundId && (roundId !== gameRound || phase !== gamePhase)){
      gameRound = roundId; gamePhase = phase;
      hasSubmitted = false;
      // don't override submitted screen unless round changed
      loadRoundUI(roundId);
    }
  });
}

function getCurrentScreen(){
  return document.querySelector('.screen.active')?.id;
}

// ── ROUND UI ──
const ROUND_META = {
  r1:{ tag:'CONFLICT', tagClass:'tag-c', title:'Tea Tank',
       task:'Pick Sagacity\'s single deadliest threat. Write a 2-sentence argument for why it\'s the most dangerous — right now, for Kate\'s specific decision.' },
  r2:{ tag:"DEVIL'S ADVOCATE", tagClass:'tag-f', title:'Flip It',
       task:'Argue AGAINST the option your group recommended. You are Kate\'s most skeptical investor. 60 seconds. No hedging.' },
  r3:{ tag:'CHAIN REACTION', tagClass:'tag-h', title:'Hot Potato',
       task:'See the question on the instructor screen. Add ONE new point — or challenge the previous group\'s answer. No repeating. No passing.' },
  r4:{ tag:'TWIST', tagClass:'tag-t', title:'Numbers Changed',
       task:'See the twist on the instructor screen. Calculate the new profit. Show your reasoning.' },
  r5:{ tag:'LIVE PITCH', tagClass:'tag-v', title:"Kate's Voicemail",
       task:'Type your 30-second voicemail to Kate before she signs. Be specific — recommendation + one reason + one risk + one number from the case.' },
};

function loadRoundUI(roundId, overrideTask, twist, state){
  if(hasSubmitted) return;
  const meta = ROUND_META[roundId];
  if(!meta) return;

  document.getElementById('rh-tag').textContent = meta.tag;
  document.getElementById('rh-tag').className = 'rh-tag '+meta.tagClass;
  document.getElementById('rh-title').textContent = meta.title;
  document.getElementById('rh-task').textContent = overrideTask || meta.task;

  // Timer
  if(localTimerSec > 0){
    document.getElementById('timer-bar').style.display='flex';
    updateSTimer();
  } else {
    document.getElementById('timer-bar').style.display='none';
  }

  // Reset selections
  selThreat=''; selOpt=''; selDir='';

  buildForm(roundId, twist, state);
  showScreen('s-round');
}

// ── BUILD FORM ──
function buildForm(roundId, twist, state){
  const card = document.getElementById('form-card');
  let html = '';

  if(roundId === 'r1'){
    const threats = [
      '🏭 New regional competitors entering the market',
      '🏪 National brands going all-natural / organic',
      '💸 Cannot afford slotting fees to get shelf space',
      '📦 Glass packaging limits cost competitiveness',
      '🛒 Amazon / online competition undercuts margins',
      '📉 Investor pressure forcing premature expansion',
    ];
    html += `<div class="field"><label>Pick your deadliest threat</label>
      <div class="threat-list">${threats.map((t,i)=>
        `<button class="thr" id="thr${i}" onclick="pickThreat(${i},'${t.replace(/'/g,"\\'")}')"> ${t}</button>`).join('')}
      </div></div>
      <div class="field">
        <label>Your 2-sentence argument — why is this most dangerous for Kate RIGHT NOW?</label>
        <textarea id="f-arg" maxlength="300" placeholder="Be specific. Tie it to Kate's decision today…" oninput="cc('f-arg',300)"></textarea>
        <div class="char-ct" id="cc-f-arg">0 / 300</div>
      </div>`;

  } else if(roundId === 'r2'){
    const opts = ['Accept broker proposal','Focus on online sales','Find a new broker','Use a distributor','Continue regional / pop-up'];
    html += `<div class="field"><label>Your group's original recommendation</label>
      <div class="opt-grid">${opts.map((o,i)=>
        `<button class="opt" id="opt${i}" onclick="pickOpt(${i},'${o}')">${o}</button>`).join('')}
      </div></div>
      <div class="field">
        <label>Your strongest counter-argument (why it could fail)</label>
        <textarea id="f-counter" maxlength="250" placeholder="Don't hedge — commit fully against your own recommendation…" oninput="cc('f-counter',250)"></textarea>
        <div class="char-ct" id="cc-f-counter">0 / 250</div>
      </div>
      <div class="field">
        <label>One specific case fact or number that supports your counter-argument</label>
        <input type="text" id="f-evid" placeholder="e.g. '$45K sampling cost nearly wipes out $20K projected profit'" maxlength="150"/>
        <div class="hint">Citing a real number earns a bonus point</div>
      </div>`;

  } else if(roundId === 'r3'){
    html += `<div class="field">
        <label>Your unique point (one sentence — must not repeat anything already said)</label>
        <textarea id="f-point" maxlength="200" placeholder="Make it specific. Generic statements score zero…" oninput="cc('f-point',200)"></textarea>
        <div class="char-ct" id="cc-f-point">0 / 200</div>
        <div class="hint">⚠ Duplicates are auto-flagged. If another group said it first, you score 0.</div>
      </div>`;

  } else if(roundId === 'r4'){
    const twistText = twist?.text || 'Wait for the instructor to reveal the twist…';
    html += `<div class="calc-hint">
        <strong>Broker plan numbers:</strong><br>
        Gross sales (9,100 × $25.63) = $233,233<br>
        COGS 40% = $93,293 · Shipping = $8,008 · Broker 5% = $11,662<br>
        Slotting = $10,019 · Advertising = $18,000 · Sampling = $45,000<br>
        <strong>Original coupons (12% × 100,000 × $1) = $12,000</strong><br>
        Trade promo = $8,804 · Pioneering = $6,000<br>
        <strong>Original profit ≈ $20,447</strong>
      </div>
      <div class="field" style="background:#f5e6ff;border:1.5px solid #cc88ff;border-radius:8px;padding:12px;">
        <label style="color:#5a1a8a;">The Twist</label>
        <div style="font-size:13.5px;color:#330033;line-height:1.6;">${twistText}</div>
      </div>
      <div class="field"><label>Does profit go UP or DOWN?</label>
        <div class="opt-grid">
          <button class="opt" id="dir-up" onclick="pickDir('up')">📈 Goes UP</button>
          <button class="opt" id="dir-down" onclick="pickDir('down')">📉 Goes DOWN</button>
        </div>
      </div>
      <div class="field">
        <label>Your calculated new profit ($)</label>
        <input type="number" id="f-profit" placeholder="e.g. 7447"/>
      </div>
      <div class="field">
        <label>Show your reasoning / calculation</label>
        <textarea id="f-reason" maxlength="300" placeholder="e.g. New coupon cost = 25% × 100,000 × $1 = $25,000. Original was $12,000. Extra cost = $13,000. New profit = $20,447 − $13,000 = $7,447" oninput="cc('f-reason',300)"></textarea>
        <div class="char-ct" id="cc-f-reason">0 / 300</div>
      </div>`;

  } else if(roundId === 'r5'){
    html += `<div class="field">
        <label>Your voicemail to Kate (type it out — 30 seconds worth)</label>
        <textarea id="f-vm" maxlength="400" placeholder="Kate, don't sign yet — …" oninput="cc('f-vm',400)" style="min-height:110px;"></textarea>
        <div class="char-ct" id="cc-f-vm">0 / 400</div>
        <div class="hint">Must include: recommendation · one reason · one risk · one number from the case</div>
      </div>`;
  }

  html += `<button class="sub-btn" id="sub-btn" onclick="submitAnswer('${roundId}')">Submit Answer →</button>`;
  card.innerHTML = html;
}

// ── FORM HELPERS ──
window.pickThreat = (i,t) => { selThreat=t; document.querySelectorAll('.thr').forEach(b=>b.classList.remove('sel')); document.getElementById(`thr${i}`).classList.add('sel'); };
window.pickOpt   = (i,o) => { selOpt=o;   document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel')); document.getElementById(`opt${i}`).classList.add('sel'); };
window.pickDir   = (d)   => { selDir=d;   document.querySelectorAll('[id^=dir-]').forEach(b=>b.classList.remove('sel')); document.getElementById(`dir-${d}`).classList.add('sel'); };
window.cc        = (id,max) => {
  const el=document.getElementById(id), cc=document.getElementById('cc-'+id);
  if(!el||!cc) return;
  const l=el.value.length; cc.textContent=`${l} / ${max}`;
  cc.className='char-ct'+(l>max*.88?' near':'');
};

// ── SUBMIT ──
window.submitAnswer = async (roundId) => {
  if(hasSubmitted){ showNotif('Already submitted!'); return; }
  const safeKey = myGroup.replace(/\s/g,'_');
  const subRef = ref(db,`submissions/${roundId}/${safeKey}`);
  let data = { group:myGroup, points:0, timestamp:Date.now() };
  let preview = '';

  if(roundId==='r1'){
    if(!selThreat){ showNotif('Please pick a threat first'); return; }
    const arg = document.getElementById('f-arg')?.value?.trim();
    if(!arg){ showNotif('Please write your argument'); return; }
    data = {...data, threat:selThreat, argument:arg, hidden:true};
    preview = `Threat: ${selThreat}\n\n"${arg}"`;
    document.getElementById('sub-note').textContent = 'Hidden until instructor reveals all. Watch the screen.';

  } else if(roundId==='r2'){
    if(!selOpt){ showNotif('Please select your original option'); return; }
    const counter = document.getElementById('f-counter')?.value?.trim();
    if(!counter){ showNotif('Please write your counter-argument'); return; }
    const evid = document.getElementById('f-evid')?.value?.trim()||'';
    data = {...data, option:selOpt, counter, evidence:evid, hidden:false};
    preview = `Recommended: ${selOpt}\n\nCounter: "${counter}"${evid?'\n\nEvidence: '+evid:''}`;
    document.getElementById('sub-note').textContent = 'Submitted. Watch the instructor score cards.';

  } else if(roundId==='r3'){
    const point = document.getElementById('f-point')?.value?.trim();
    if(!point){ showNotif('Please write your point'); return; }
    // Simple duplicate check against existing submissions
    const snap = await get(ref(db,'submissions/r3'));
    let isDupe = false;
    if(snap.exists()){
      const existing = Object.values(snap.val()).map(s=>s.point?.toLowerCase()||'');
      const myWords = new Set(point.toLowerCase().split(/\s+/).filter(w=>w.length>4));
      isDupe = existing.some(p=>{
        const theirWords = new Set(p.split(/\s+/).filter(w=>w.length>4));
        let overlap=0; myWords.forEach(w=>{ if(theirWords.has(w)) overlap++; });
        return overlap >= 3;
      });
    }
    data = {...data, point, duplicate:isDupe, hidden:false};
    preview = `Your point: "${point}"${isDupe?'\n\n⚠ May be flagged as duplicate':''}`;
    document.getElementById('sub-note').textContent = isDupe ? '⚠ Possible duplicate flagged — check with instructor.' : 'Submitted!';

  } else if(roundId==='r4'){
    if(!selDir){ showNotif('Please pick a direction'); return; }
    const profit = document.getElementById('f-profit')?.value?.trim();
    if(!profit){ showNotif('Please enter your calculated profit'); return; }
    const reason = document.getElementById('f-reason')?.value?.trim()||'';
    // Auto-score: direction correct = 1pt, within 15% of correct answer = 2pt
    // Get correct answer from game state
    const gameSnap = await get(ref(db,'game'));
    const gData = gameSnap.val();
    const correctDir = gData?.correctDirection||'down';
    const correctProfit = gData?.correctProfit||0;
    let autoPts = 0;
    if(selDir===correctDir) autoPts+=1;
    const profNum=parseFloat(profit);
    if(correctProfit>0 && !isNaN(profNum) && Math.abs(profNum-correctProfit)/correctProfit<0.15) autoPts+=2;
    const autoScore={dirOk:selDir===correctDir, profOk:correctProfit>0&&!isNaN(profNum)&&Math.abs(profNum-correctProfit)/correctProfit<0.15};
    data = {...data, direction:selDir, newProfit:profit, reasoning:reason, hidden:false, autoScore, points:autoPts};
    if(autoPts>0){
      const gSnap = await get(ref(db,`groups/${myGroupKey}`));
      const curPts = gSnap.val()?.points||0;
      await update(ref(db,`groups/${myGroupKey}`),{points:curPts+autoPts});
    }
    preview = `Direction: ${selDir}\nNew profit: $${profit}\n\nReasoning: ${reason}`;
    document.getElementById('sub-note').textContent = autoPts>0 ? `Auto-scored: ${autoPts} pt${autoPts!==1?'s':''} earned!` : 'Submitted. Instructor may award additional points.';

  } else if(roundId==='r5'){
    const vm = document.getElementById('f-vm')?.value?.trim();
    if(!vm){ showNotif('Please type your voicemail'); return; }
    data = {...data, voicemail:vm, hidden:true};
    preview = `"${vm}"`;
    document.getElementById('sub-note').textContent = 'Hidden until instructor reveals all voicemails.';
  }

  await set(subRef, data);
  hasSubmitted = true;
  document.getElementById('sub-preview').textContent = preview;
  showScreen('s-submitted');
  showNotif('Submitted! ✅');
};

// ── VOTING ──
async function loadVoting(roundId, isVoicemail){
  const snap = await get(ref(db,`submissions/${roundId}`));
  if(!snap.exists()){ showScreen('s-waiting'); return; }
  const subs = Object.values(snap.val()).filter(s=>s.group!==myGroup && !s.hidden);

  document.getElementById('vote-h').textContent = isVoicemail ? 'Vote for the Best Voicemail' : 'Vote for the Most Compelling Argument';
  document.getElementById('vote-sub').textContent = isVoicemail
    ? 'Which voicemail would actually change what Kate does this morning?'
    : 'Which threat argument is most convincing?';

  document.getElementById('vote-list').innerHTML = subs.map(s=>`
    <div class="vc" id="vc-${s.group.replace(/\s/g,'_')}" onclick="castVote('${roundId}','${s.group}')">
      <div class="vc-grp">${s.group}</div>
      <div class="vc-body">${isVoicemail?`"${s.voicemail||''}"`:
        `<strong>${s.threat||''}</strong><br><span style="color:#555;">${s.argument||''}</span>`}
      </div>
    </div>`).join('');

  showScreen('s-voting');
}

window.castVote = async (roundId, groupName) => {
  if(hasVoted){ showNotif('Already voted!'); return; }
  hasVoted = true;
  const safeKey = groupName.replace(/\s/g,'_');
  await update(ref(db,`submissions/${roundId}/${safeKey}/votes`),{[myGroup.replace(/\s/g,'_')]:true});
  // Award 1pt to voted group
  const snap = await get(ref(db,'groups'));
  if(snap.exists()){
    const entry = Object.entries(snap.val()).find(([,g])=>g.name===groupName);
    if(entry){
      const [key,g]=entry;
      await update(ref(db,`groups/${key}`),{points:(g.points||0)+1});
    }
  }
  document.querySelectorAll('.vc').forEach(c=>c.classList.remove('voted'));
  document.getElementById(`vc-${safeKey}`)?.classList.add('voted');
  showNotif('Vote cast! 👍');
};

// ── TIMER ──
function startLocalTimer(){
  clearInterval(localTimerInterval);
  localTimerInterval = setInterval(()=>{
    localTimerSec = Math.max(0,localTimerSec-1);
    updateSTimer();
    if(localTimerSec<=0) clearInterval(localTimerInterval);
  },1000);
}
function stopLocalTimer(){ clearInterval(localTimerInterval); localTimerInterval=null; }
function updateSTimer(){
  const el=document.getElementById('stimer');
  if(!el) return;
  if(localTimerSec<=0){ el.textContent='—'; el.className='tb-time'; document.getElementById('timer-bar').style.display='none'; return; }
  document.getElementById('timer-bar').style.display='flex';
  const m=Math.floor(localTimerSec/60),s=localTimerSec%60;
  el.textContent=`${m}:${String(s).padStart(2,'0')}`;
  el.className='tb-time'+(localTimerSec<=10?' warn':'');
}

// ── SCREEN ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── NOTIF ──
let nT;
function showNotif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(nT); nT=setTimeout(()=>el.classList.remove('show'),2400);
}
</script>
